<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stack operations simulation</title>

<style>
body {
    font-family: Outfit, sans-serif;
    color: #232323;
    text-align: center;
    background: #f5f5f5;
}

.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
}

.code {
    text-align: left;
    background: #fff;
    padding: 10px;
    border: 2px solid #232323;
    width: 260px;
    font-size: 14px;
}

.line {
    padding: 4px;
    background: #724b9e;
    color: white;
    margin-bottom: 2px;
}

.stack-box {
    width: 180px;
    height: 260px;
    background: #e8d227;
    border: 3px solid #232323;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    padding: 8px;
}

.block {
    width: 110px;
    height: 35px;
    border: 2px solid #232323;
    margin: 4px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
}

.top {
    background: #724b9e;
    color: white;
}

.output-box {
    width: 200px;
    height: 90px;
    border: 3px solid #232323;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 10px;
    font-size: 16px;
    text-align: center;
}

.length-box {
    margin-top: 8px;
    font-weight: bold;
}

button {
    margin: 6px;
    padding: 8px 14px;
    background: #724b9e;
    color: white;
    border: none;
    cursor: pointer;
}

input {
    padding: 5px;
    margin: 10px;
}
</style>
</head>

<body>

<h2>Stack operations simulation</h2>

<div>
    Value: <input type="text" id="valueInput" placeholder="Enter value">
    <br>
    <button onclick="PUSHOp()">PUSH</button>
    <button onclick="POPOp()">POP</button>
    <button onclick="PEEKOp()">PEEK</button>
    <button onclick="SIZEOp()">SIZE</button>
    <button onclick="ISEMPTYOp()">isEMPTY</button>
    <button onclick="resetSim()">Refresh</button>
</div>

<div class="container">

    <div class="code" id="codeBox"></div>

    <div>
        <h3>Stack</h3>
        <div class="stack-box" id="stackBox"></div>

        <div class="length-box" id="lengthBox">
            Length: 0 / 5
        </div>

        <div class="output-box" id="outputBox">--</div>
    </div>

</div>

<script>
let stack = [];
let maxSize = 5;

/* Render stack */
function renderStack() {
    const box = document.getElementById('stackBox');
    box.innerHTML = "";

    stack.forEach((val, index) => {
        let div = document.createElement('div');
        div.className = "block";
        div.innerText = val;

        if (index === stack.length - 1) {
            div.classList.add("top");
        }

        box.appendChild(div);
    });

    document.getElementById("lengthBox").innerText =
        "Length: " + stack.length + " / 5";
}

/* Show code */
function showCode(lines) {
    const codeBox = document.getElementById("codeBox");
    codeBox.innerHTML = "";

    lines.forEach(line => {
        let div = document.createElement("div");
        div.className = "line";
        div.innerText = line;
        codeBox.appendChild(div);
    });
}

/* PUSH */
function PUSHOp() {
    let value = document.getElementById("valueInput").value;

    showCode([
        "if len(stack) == 5:",
        "    print('Overflow')",
        "else:",
        "    stack.append(value)"
    ]);

    if (value === "") {
        document.getElementById("outputBox").innerText = "Enter value first";
        return;
    }

    if (stack.length === maxSize) {
        document.getElementById("outputBox").innerText = "Overflow";
    } else {
        stack.push(value);   // ✅ correct
        document.getElementById("outputBox").innerText = "Inserted: " + value;
    }

    document.getElementById("valueInput").value = "";
    renderStack();
}

/* POP */
function POPOp() {
    showCode([
        "if len(stack) == 0:",
        "    print('Underflow')",
        "else:",
        "    item = stack.pop()",
        "    print(item)"
    ]);

    if (stack.length === 0) {
        document.getElementById("outputBox").innerText = "Underflow";
    } else {
        let item = stack.pop();   // ✅ correct
        document.getElementById("outputBox").innerText = "Popped: " + item;
    }

    renderStack();
}

/* PEEK */
function PEEKOp() {
    showCode([
        "if len(stack) == 0:",
        "    print('Empty')",
        "else:",
        "    print(stack[-1])"
    ]);

    if (stack.length === 0) {
        document.getElementById("outputBox").innerText = "Empty";
    } else {
        document.getElementById("outputBox").innerText =
            "Top: " + stack[stack.length - 1];
    }
}

/* SIZE */
function SIZEOp() {
    showCode(["print(len(stack))"]);
    document.getElementById("outputBox").innerText =
        "Size: " + stack.length;
}

/* isEMPTY */
function ISEMPTYOp() {
    showCode([
        "if len(stack) == 0:",
        "    print(True)",
        "else:",
        "    print(False)"
    ]);

    document.getElementById("outputBox").innerText =
        (stack.length === 0) ? "True" : "False";
}

/* Reset */
function resetSim() {
    stack = [];
    document.getElementById("outputBox").innerText = "--";
    document.getElementById("valueInput").value = "";
    document.getElementById("codeBox").innerHTML = "";
    renderStack();
}

renderStack();
</script>

</body>
</html>
